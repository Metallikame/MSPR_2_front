name: CI — Build & Push Frontend

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "nginx.conf"
      - "Dockerfile"
      - "k8s/**"

env:
  IMAGE: ghcr.io/metallikame/mspr_2_front

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update image tag in k8s manifest
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|image: ghcr.io/metallikame/mspr_2_front:.*|image: ${{ env.IMAGE }}:${SHORT_SHA}|g" \
            k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update frontend image tag to $(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
