apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mspr2-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  labels:
    app.kubernetes.io/part-of: cofrap
spec:
  project: default

  source:
    repoURL: https://github.com/Metallikame/MSPR_2_front.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: cofrap

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
