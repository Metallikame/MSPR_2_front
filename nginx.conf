server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
 
    location /function/ {
        proxy_pass http://10.43.183.55:8080/function/;
        proxy_http_version 1.1;
        proxy_set_header Host "10.43.183.55:8080";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
 
    location / {
        try_files $uri $uri/ /index.html;
    }
}
 